services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bacteria
      POSTGRES_PASSWORD: bacteria
      POSTGRES_DB: bacteria
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bacteria"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: bacteria-api
    env_file: .env
    environment:
      - POSTGRES__HOST=postgres
      - POSTGRES__PORT=5432
    ports:
      - "8000:8000"
    volumes:
      - ./context:/app/context
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: bacteria-worker
    env_file: .env
    environment:
      - POSTGRES__HOST=postgres
      - POSTGRES__PORT=5432
    volumes:
      - ./context:/app/context
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
